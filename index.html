<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portoflio-bentogrid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <h1 class="logo">Salemko</h1>

        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Works</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="bento-gallery">
        <!-- 🔷 BENTO HAUT -->
        <div class="bento">
          <div class="left-col">
            <div class="card intro">
              <div class="rect"><h1>&lt;/&gt;</h1></div>
              <div>
                <h2>Developer <br />Introduction</h2>
              </div>
            </div>

            <div class="card name">
              <img src="images/bentosalemko.png" alt="" />
              <!-- <h2>Salem</h2> -->
            </div>
          </div>

          <div class="card photo">
            <img src="images/sal.PNG" alt="Profile" />
          </div>
        </div>

        <div class="bento2">
          <div class="col col1">
            <div class="card job">
              <div class="design-card">
                Full Stack<br />Developer

                <!-- Les 4 coins -->
                <span class="corner top-left"></span>
                <span class="corner top-right"></span>
                <span class="corner bottom-left"></span>
                <span class="corner bottom-right"></span>
              </div>
            </div>
            <div class="card about">
              <img
                src="https://tse1.mm.bing.net/th/id/OIP.6vmpbJPxcm9n24pCRVwvQgHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="react"
              />
              <img
                src="https://th.bing.com/th/id/R.2bee11a830bacc5ae9006df56b20c33a?rik=nXUBy4boCTrW8w&pid=ImgRaw&r=0"
                alt="react"
              />
              <img
                src="https://www.pngitem.com/pimgs/m/234-2347744_googleanalytics-logo-google-analytics-logo-circle-hd-png.png"
                alt="data analytics"
              />
              <img
                src="https://tse4.mm.bing.net/th/id/OIP.L-GVVxSOzGefe1PF4TJ2TQAAAA?w=465&h=465&rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="html"
              />
              <img
                src="https://tse2.mm.bing.net/th/id/OIP.yjfKrSsUWsTNsU9Oae9dRgHaHa?pid=ImgDet&w=178&h=178&c=7&dpr=1,5&o=7&rm=3"
                alt="nextjs"
              />
            </div>
          </div>

          <div class="col col2">
            <div class="card music">
              <p>
                🎵 I'm Salem, a Full Stack Developer passionate about building
                modern web applications and solving real-world problems.
              </p>
            </div>
            <div class="card country">
              <p>DR Congo</p>
            </div>
          </div>

          <div class="col col3">
            <div class="card quote">
              <p>&lt;/&gt;Code.</p>
            </div>
            <div class="card social">
              <img
                src="https://wallpapers.com/images/hd/git-hub-logo-icon-kzu74ijdyck6lo3v-2.png"
                alt="GitHub"
              />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
